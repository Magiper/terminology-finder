<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Terminology Finder</title>

<style>

body{
  font-family: "Segoe UI", Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN CARD */
.container{
  width: 420px;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* BACKGROUND DECOR */
.container::before{
  content: "";
  position: absolute;
  bottom: -40px;
  left: -40px;
  width: 200px;
  height: 200px;
  background: rgba(74, 144, 226, 0.1);
  border-radius: 50%;
  pointer-events: none;
}

.container::after{
  content: "";
  position: absolute;
  top: -40%;
  right: -40px;
  width: 200%;
  height: 200%;
  background: rgba(74, 144, 226, 0.08);
  border-radius: 50%;
  pointer-events: none;
}

/* LOGO */
.logo{
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4a90e2;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-weight: bold;
}

/* TITLE */
.title{
  font-size: 18px;
  font-weight: 600;
  color: #2c3e50;
  line-height: 1.4;
}

/* DIVIDER */
.divider{
  height: 2px;
  background: #e5e7eb;
  margin: 15px 0 20px;
}

.search-box{
  width:100%;
  padding:12px;
  margin: 10px 0;
  font-size:18px;
  border-radius:8px;
  border:1px solid #ccc;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-box:focus{
  outline:none;
  border-color:#4a90e2;
}

.result-card{
  background:#f9fafb;
  text-align: left;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.term{
  font-size:20px;
  font-weight:bold;
  color:#34495e;
  margin-bottom:6px;
}

.translation{
  background:#eef4ff;
  padding:4px 8px;
  border-radius:5px;
  display:inline-block;
  margin:3px;
  font-size:13px;
}

.notes{
  margin-top:10px;
  font-size:13px;
  color:#666;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#888;
}

/* DECOR DOTS */
.dots{
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
}

.dots span{
  width: 6px;
  height: 6px;
  background: #ddd;
  display: block;
  border-radius: 2px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
  <img src= "logo.png" width= "40">
</div>

<div class="title">
  DIREKTORAT JENDERAL PEMASYARAKATAN<br>
  SULAWESI TENGGARA
</div>

<div class="divider"></div>

<input id="search" class="search-box" placeholder="Cari terminologi...">

<input id="lawSearch" class="search-box" placeholder="Cari hukum internasional...">

<div id="results"></div>
<div id="lawResults"></div>

<div class="footer">
© Translator Team
</div>

<div class="dots" id= "dots"></div>

</div>

<script src="script.js"></script>

</body>
</html>
