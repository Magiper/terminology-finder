<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law Terminology Finder</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>

body{
  font-family: "Segoe UI", sans-serif;
  margin:0;
  background: linear-gradient(#0b2a3a, #0b2a3a);
}

/* HERO */
.hero{
  height: 240px;
  background: url("background.jpg") center/cover no-repeat;
  position: relative;
}

/* DARK OVERLAY */
.overlay{
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(10, 20, 40, 0.6);
}

/* HERO CONTENT */
.hero-content{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #ffd166;
}

/* LOGO */
.logo{
  width: 70px;
  margin-bottom: 10px;
}

.hero h1{
  font-size: 22px;
  line-height: 1.4;
}

.search-panel{
  width:90%;
  max-width: 420px;
  margin: 20px auto 40px;
  background: #213a4a;
  padding:30px;
  border-radius:10px;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.result-card{
  background:#2b4a5c;
  margin-top: 10px;
  padding: 12px;
  border-radius: 6px;
  color: white;
  line-height: 1.6;
  font-size: 14px;
}

.input-wrapper{
  position: relative;
  margin: 12px 0;
}

.input-wrapper input{
  width: 100%;
  padding: 12px 38px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  outline: none;
  box-sizing: border-box;
}

/* ICON */
.icon{
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
}

/* CLEAR BUTTON */
.clear{
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  display: none;
}

/* SHOW CLEAR WHEN TYPING */
.input-wrapper input:not(:placeholder-shown) + .clear{
  display: block;
}

/* DROPDOWN */
.suggestions{
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: white;
  border-radius: 8px;
  margin-top: 5px;
  max-height: 150px;
  overflow-y: auto;
  z-index: 10;
}

.suggestion-item{
  padding: 10px;
  cursor: pointer;
}

.suggestion-item:hover{
  background: #eee;
}

.term{
  font-weight:bold;
  margin-bottom:5px;
}

.translation{
  background:#4a90e2;
  padding:4px 8px;
  border-radius:4px;
  display:inline-block;
  margin:3px;
  font-size:12px;
}

.notes{
  margin-top:10px;
  font-size:13px;
  color:#ffd166;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#ccc;
}

.speak-btn{
  margin-left: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
}

.menu{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.menu-item{
  flex: 1 1 45%;
  font-size: 13px;
  background: #2b4a5c;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

.menu-item:hover{
  background: #3b5f75;
}

.menu-item:active{
  background: #4a90e2;
}

/* Tabs */
.tab{
  display: none;
}

.tab.active{
  display: block;
}

.term-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:10px;
}

.section{
  margin-top: 10px;
}

.section-title{
  margin-bottom: 4px;
  font-size: 12px;
  opacity: 0.7;
}

.item{
  background: #2b4a5c;
  padding: 6px;
  border-radius: 6px;
  margin-bottom: 4px;
}

.item small{
  display: block;
  font-size: 11px;
  opacity: 0.7;
}

.item.bad{
  background: #7a2c2c;
}

.notes-block{
  margin-top: 10px;
  font-size: 13px;
  color: #ffd166;
}

.related{
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.8;
}

.related-item{
  cursor: pointer;
  color: #4da3ff;
  margin-right: 6px;
  padding: 2px 6px;
  border-radius: 4px;
}

.related-item:hover{
  text-decoration: underline;
  background: #2b4a5c;
}

.highlight{
  background: #ffd166;
  color: black;
  padding: 1px 3px;
  border-radius: 3px;
}

@media (max-width: 480px){
  .hero{
    height: 180px;
  }

  .hero h1{
    font-size: 16px;
  }

  .logo{
    width: 50px;
  }

  .search-panel{
    padding: 20px;
  }

  .menu-item{
    font-size: 12px;
    padding: 8px;
  }

  .result-card{
    font-size: 13px;
  }
}
  
</style>

</head>

<body>
<!-- HERO SECTION -->
<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <img src= "logo.png" class="logo">

    <h1>
      DIREKTORAT JENDERAL PEMASYARAKATAN<br>
      SULAWESI TENGGARA
    </h1>

  </div>
  
</div>

<!-- SEARCH PANEL -->
<div class="search-panel">

  <!-- MENU -->
  <div class="menu">
    <div class="menu-item active" onclick="switchTab(event, 'term')">🔍 Terminologi</div>
    <div class="menu-item" onclick="switchTab(event, 'law')">🗿 UU Internasional</div>
    <div class="menu-item" onclick="switchTab(event, 'case')">📼 Riwayat Kasus</div>
    <div class="menu-item" onclick="switchTab(event, 'reading')">📖 Daftar Bacaan</div>
  </div>

  <!-- CONTENT -->
  <div id="termTab" class="tab active">
    <div class="input-wrapper">
      <span class="icon">🔍</span>
      <input id="search" placeholder="Cari terminologi...">
      <span class="clear" onclick="clearInput('search')">❌</span>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div id="results"></div>
  </div>

  <div id="lawTab" class="tab">
    <div class="input-wrapper">
      <span class="icon">🔍</span>
      <input id="lawSearch" placeholder="Cari hukum internasional...">
      <span class="clear" onclick="clearInput('lawSearch')">❌</span>
      <div class="suggestions" id="lawSuggestions"></div>
    </div>
    <div id="lawResults"></div>
  </div>

  <div id="caseTab" class="tab">
    <div class="input-wrapper">
      <span class="icon">🔍</span>
      <input id="caseSearch" placeholder="Cari Kasus...">
      <span class="clear" onclick="clearInput('caseSearch')">❌</span>
      <div class="suggestions" id="caseSuggestions"></div>
    </div>
    <div id="caseResults"></div>
  </div>

  <div id="readingTab" class="tab">
    <div id="readingResults"></div>
  </div>

  <div class="footer">© LEX-KOMTRANS KANWILPAS</div>

</div>

<script src="script.js"></script>

</body>
</html>
