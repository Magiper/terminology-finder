<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Terminology Finder</title>

<style>

body{
font-family: "Segoe UI", Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#2c3e50;
margin-bottom:30px;
}

.search-box{
width:100%;
padding:14px 18px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-box:focus{
outline:none;
border-color:#4a90e2;
}

.result-card{
background:white;
padding:18px;
margin-top:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

.term{
font-size:20px;
font-weight:600;
color:#34495e;
margin-bottom:10px;
}

.translation{
background:#eef4ff;
padding:6px 10px;
border-radius:6px;
display:inline-block;
margin:4px;
font-size:14px;
}

.notes{
margin-top:10px;
font-size:13px;
color:#666;
}

.footer{
text-align:center;
margin-top:40px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Indonesian Terminology Finder</h1>

<input
id="search"
class="search-box"
placeholder="Type a term..."
>

<div id="results"></div>

<div class="footer">
Terminology Lookup Tool
</div>

</div>

<script src="script.js"></script>

</body>

</html>
