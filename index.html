<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Terminology Finder</title>

<style>

body{
  font-family: "Segoe UI", sans-serif;
  margin:0;
  background: linear-gradient(#0b2a3a, #0b2a3a);
}

/* HERO */
.hero{
  height: 240px;
  background: url("background.jpg") center/cover no-repeat;
  position: relative;
}

/* DARK OVERLAY */
.overlay{
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(10, 20, 40, 0.6);
}

/* HERO CONTENT */
.hero-content{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #ffd166;
}

/* LOGO */
.logo{
  width: 70px;
  margin-bottom: 10px;
}

.hero h1{
  font-size: 22px;
  line-height: 1.4;
}

.search-panel{
  width:420px;
  margin: 20px auto 40px;
  background: #213a4a;
  padding:30px;
  border-radius:10px;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.result-card{
  background:#2b4a5c;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  color: white;
}

.input-wrapper{
  position: relative;
  margin: 12px 0;
}

.input-wrapper input{
  width: 100%;
  padding: 14px 40px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  outline: none;
  box-sizing: border-box;
}

/* ICON */
.icon{
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
}

/* CLEAR BUTTON */
.clear{
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  display: none;
}

/* SHOW CLEAR WHEN TYPING */
.input-wrapper input:not(:placeholder-shown) + .clear{
  display: block;
}

/* DROPDOWN */
.suggestions{
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: white;
  border-radius: 8px;
  margin-top: 5px;
  max-height: 150px;
  overflow-y: auto;
  z-index: 10;
}

.suggestion-item{
  padding: 10px;
  cursor: pointer;
}

.suggestion-item:hover{
  background: #eee;
}

.term{
  font-weight:bold;
  margin-bottom:5px;
}

.translation{
  background:#4a90e2;
  padding:4px 8px;
  border-radius:4px;
  display:inline-block;
  margin:3px;
  font-size:12px;
}

.notes{
  margin-top:10px;
  font-size:13px;
  color:#ffd166;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#ccc;
}

.speak-btn{
  margin-left: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
}

.menu{
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item{
  flex: 1;
  background: #2b4a5c;
  padding: 12px;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

.menu-item:hover{
  background: #3b5f75;
}

.menu-item:active{
  background: #4a90e2;
}

/* Tabs */
.tab{
  display: none;
}

.tab.active{
  display: block;
}

</style>

</head>

<body>
<!-- HERO SECTION -->
<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <img src= "logo.png" class="logo">

    <h1>
      DIREKTORAT JENDERAL PEMASYARAKATAN<br>
      SULAWESI TENGGARA
    </h1>

  </div>
  
</div>

<!-- SEARCH PANEL -->
<div class="search-panel">

  <!-- MENU -->
  <div class="menu">
    <div class="menu-item active" onclick="switchTab('term')">🔍 Terminology</div>
    <div class="menu-item" onclick="switchTab('law')">⚖ Law</div>
    <div class="menu-item" onclick="switchTab('history')">📑 History</div>
  </div>

  <!-- CONTENT -->
  <div id="termTab" class="tab active">
    <div class="input-wrapper">
      <span class="icon">🔍</span>
      <input id="search" placeholder="Cari terminologi...">
      <span class="clear" onclick="clearInput('search')">❌</span>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div id="results"></div>
  </div>

  <div id="lawTab" class="tab">
    <div class="input-wrapper">
      <span class="icon">🔍</span>
      <input id="lawSearch" placeholder="Cari hukum internasional...">
      <span class="clear" onclick="clearInput('lawSearch')">❌</span>
      <div class="suggestions" id="lawSuggestions"></div>
    </div>
    <div id="lawResults"></div>
  </div>

  <div id="historyTab" class="tab">
    <div id="historyResults"></div>
  </div>

  <div class="footer">© Translator Team</div>

</div>

<script src="script.js"></script>

</body>
</html>
