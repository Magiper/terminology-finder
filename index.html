<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law Terminology Finder</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>

/* ===== GLOBAL ===== */
body{
  font-family: "Segoe UI", sans-serif;
  margin:0;
  background: #2F2F35;
  overflow: hidden;
}

/* ===== LAYOUT ===== */
.app{
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width: 220px;
  background: #cfcfcf;
  padding: 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sidebar-logo{
  width: 70px;
  margin-bottom: 20px;
}

.nav-item{
  width: 90%;
  background: #ddd;
  margin: 8px 0;
  padding: 12px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.nav-item:hover{
  background: #bbb;
}

/* ACTIVE MENU */
.nav-item.active{
  background: #4a90e2;
  color: white;
  font-weight: bold;
  transform: scale(1.05);
}

/* CONTACT */
.contact{
  margin-top: auto;
  font-size: 12px;
  text-align: center;
}

/* ===== MAIN PANEL ===== */
.main{
  flex: 1;
  padding: 15px;
  background: #4a4a52;
  border-radius: 20px;
  margin: 15px;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

/* ===== MAIN PANEL ===== */
.mini-hero{
  height: 100px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  background: url("background.jpg") center/cover no-repeat;
  margin-bottom: 15px;
}

/* DARK OVERLAY */
.hero-overlay{
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

/* CONTENT */
.hero-content{
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

/* LOGO */
.hero-logo{
  width: 55px;
  flex-shrink: 0;
}

/* TEXT */
.hero-text{
  color: white;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
}

/* ===== HEADER ===== */
.header{
  background: #7a7a82;
  padding: 10px 15px;
  border-radius: 30px;
  color: #ffd166;
  font-weight: bold;
  overflow: hidden;
}

/* MOVING TEXT */
.marquee{
  white-space: nowrap;
}

.marquee span{
  display: inline-block;
  padding-left: 100%;
  animation: marqueeMove 15s linear infinite;
}

@keyframes marqueeMove{
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* ===== SEARCH ===== */
.search-box{
  margin: 20px auto;
  max-width: 520px;
  width: 100%;
  transition: 0.3s;
  position: relative;
}

.search-box input{
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  outline: none;
}

.clear-btn{
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
}

.clear-btn:hover{
  color: black;
}

/* ===== RESULT PANEL ===== */
.result-panel{
  flex: 1;
  background: #2F2F35;
  border-radius: 20px;
  margin-top: 15px;
  height: 100%;
  transition: 0.3s;
  padding: 20px;
  overflow-y: auto;

  display: block;
}

/* ===== RESULT CARDS ===== */
.result-card{
  background: #3b3b46;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  color: white;
  line-height: 1.6;
  font-size: 14px;
}

.term{
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #ffd166;
}

.item{
  background: #4b4b57;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}

.item.primary{
  border-left: 4px solid #4caf50;
}

.item.alt{
  border-left: 4px solid #ffb300;
}

.item.bad{
  border-left: 4px solid #f44336;
}

.notes-block{
  margin-top:12px;
  color:#ddd;
}

.related{
  margin-top:10px;
}

.related-item{
  color:#4da3ff;
  cursor:pointer;
  margin-right:8px;
}

.related-item:hover{
  text-decoration:underline;
}

.section-title{
  font-size:12px;
  opacity:0.7;
  margin-bottom:5px;
}

.highlight{
  background:#ffd166;
  color:black;
  padding:2px 4px;
  border-radius:4px;
}

/* ===== SUGGESTIONS ===== */
.suggestion-item{
  background:#4b4b57;
  color:white;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 5px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1.4;
}

.suggestion-item b{
  font-size: 14px;
}

.suggestion-item small{
  opacity: 0.7;
}

.suggestion-item:hover{
  background:#5a5a68;
}

/* ===== FOOTER ===== */
.footer{
  text-align: center;
  font-size: 12px;
  color: #ccc;
  margin-top: 10px;
}

/* ===== UU LAYOUT ===== */
.uu-layout{
  display: flex;
  gap: 20px;
}

.uu-left{
  flex: 2;
}

.uu-right{
  flex: 1;
}

.uu-title{
  font-weight: bold;
  margin-bottom: 15px;
}

.relevansi-box{
  background: #4b4b57;
  padding: 15px;
  border-radius: 12px;
  position: sticky;
  top: 0;
  align-self: flex-start;
}

.relevansi-title{
  font-size: 18px;
  font-weight: bold;
  color: #ffd166;
  margin-bottom: 10px;
}

/* ===== READING LAYOUT ===== */
.reading-layout{
  display: flex;
  gap: 20px;
}

.reading-left{
  flex: 1;
}

.reading-right{
  flex: 1;
}

@media(max-width: 900px){
  .uu-layout,
  .reading-layout{
    flex-direction: column;
  }
}

/* ===== ANIMATION (content fade) ===== */
.fade{
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{ opacity: 0; transform: translateY(10px); }
  to{ opacity: 1; transform: translateY(0); }
}
  
</style>
</head>

<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">

    <img src="logo.png" class="sidebar-logo">

    <div class="nav-item active" onclick="switchFeature(event, 'term')">🔍 Terminologi</div>
    <div class="nav-item" onclick="switchFeature(event, 'law')">📜 UU Internasional</div>
    <div class="nav-item" onclick="switchFeature(event, 'case')">📂 Riwayat Kasus</div>
    <div class="nav-item" onclick="switchFeature(event, 'reading')">📖 Daftar Bacaan</div>

    <div class="contact">
      Punya Kendala?<br>
      0877-7155-5574 (Hadi)
    </div>

  </div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <div class="mini-hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <img src="logo.png" class="hero-logo left-logo">

        <div class="hero-text">
          LAW TERMINOLOGY FINDER
        </div>

        <img src="logo-p.png" class="hero-logo right-logo">
      </div>

    </div>

    <!-- HEADER -->
    <div class="header">
      <div class="marquee">
        <span>DIREKTORAT JENDERAL PEMASYARAKATAN SULAWESI TENGGARA</span>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box" id="searchBox">
      <input id="search" placeholder="Cari terminologi...">
      <button class="clear-btn" onclick="clearMainSearch()">❌</button>
    </div>

    <div class="result-panel fade">

      <!-- TERMINOLOGY -->
      <div id="globalSuggestions"></div>
      <div id="results"></div>

      <!-- LAW -->
      <input id="lawSearch" style="display: none;">
      <div id="globalSuggestions"></div>
      <div id="lawResults"></div>

      <!-- CASE -->
      <input id="caseSearch" style="display: none;">
      <div id="globalSuggestions"></div>
      <div id="caseResults"></div>

      <!-- READING -->
      <div id="readingResults"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">© LEX-KOMTRANS KANWILPAS</div>
  </div>

</div>

<script src="script.js"></script>

<script>

/* ===== FEATURE SWITCHER ===== */
let currentFeature = "term";

function switchFeature(event, feature){

  currentFeature = feature;

  // HIDE ALL SUGGESTIONS
  document.getElementById("suggestions").style.display = "none";
  document.getElementById("lawSuggestions").style.display = "none";
  document.getElementById("caseSuggestions").style.display = "none";

  // CLEAR SUGGESTIONS
  clearSuggestions("suggestions");
  clearSuggestions("lawSuggestions");
  clearSuggestions("caseSuggestions");

  // ACTIVE MENU
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
  });

  event.currentTarget.classList.add('active');


  // reset search UI
  const searchBox = document.getElementById("searchBox");
  const mainInput = document.getElementById("search");

  // CLEAR UI
  mainInput.value = "";

  clearResults("results");
  clearResults("lawResults");
  clearResults("caseResults");
  clearResults("readingResults");

  clearSuggestions("suggestions");
  clearSuggestions("lawSuggestions");
  clearSuggestions("caseSuggestions");

  document.getElementById("results").style.display = "none";
  document.getElementById("lawResults").style.display = "none";
  document.getElementById("caseResults").style.display = "none";
  document.getElementById("readingResults").style.display = "none";

  // ===== TERMINOLOGI =====
  if(feature === "term"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari terminologi...";
    document.getElementById("results").style.display = "block";
    document.getElementById("suggestions").style.display = "block";
    document.getElementById("lawSuggestions").style.display = "none";
    document.getElementById("caseSuggestions").style.display = "none";

    mainInput.oninput = function(){
      let query = this.value.trim().toLowerCase();

      document.getElementById("suggestions").style.display = "block";

      if(query === ""){
        showHistory();
        clearSuggestions("suggestions");
        return;
      }

      let results = filterTerms(query);

      updateHistory(results);
      renderSuggestions(results, "suggestions", "selectSuggestion");
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        let query = this.value.trim().toLowerCase();
        let results = filterTerms(query);
        clearSuggestions("suggestions");
        renderResults(results, query);
      }
    };
  }

  // ===== LAW =====
  else if(feature === "law"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari hukum internasional...";
    document.getElementById("lawResults").style.display = "block";
    document.getElementById("suggestions").style.display = "none";
    document.getElementById("lawSuggestions").style.display = "block";
    document.getElementById("caseSuggestions").style.display = "none";

    mainInput.oninput = function(){
      let query = this.value.trim().toLowerCase();

      document.getElementById("lawSuggestions").style.display = "block";

      if(query.length < 3){
        clearResults("lawResults");
        clearSuggestions("lawSuggestions");
        return;
      }

      let results = filterUU(query);

      renderSuggestions(results, "lawSuggestions", "selectLaw", "law");
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        let query = this.value.trim().toLowerCase();
        let results = filterUU(query);
        clearSuggestions("lawSuggestions");
        renderUU(results);
      }
    };
  }

  // ===== CASE =====
  else if(feature === "case"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari kasus...";
    document.getElementById("caseResults").style.display = "block";
    document.getElementById("suggestions").style.display = "none";
    document.getElementById("lawSuggestions").style.display = "none";
    document.getElementById("caseSuggestions").style.display = "block";

    mainInput.oninput = function(){
      let query = this.value.trim().toLowerCase();

      if(query === ""){
        clearSuggestions("caseSuggestions");
        clearResults("caseResults");
        return;
      }

      let results = filterCases(query);

      renderSuggestions(results, "caseSuggestions", "selectCase", "case");
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        let query = this.value.trim().toLowerCase();
        let results = filterCases(query);
        clearSuggestions("caseSuggestions");
        renderCases(results);
      }
    };
  }

  // ===== READING =====
  else if(feature === "reading"){
    searchBox.style.display = "none";
    document.getElementById("readingResults").style.display = "block";
    renderReading();
  }
}

function clearMainSearch(){
  const input = document.getElementById("search");
  input.value = "";

  clearSuggestions("globalSuggestions");

  clearResults("results");
  clearResults("lawResults");
  clearResults("caseResults");

  if(currentFeature === "term"){
    showHistory();
  }

  input.focus();
}

</script>

</body>
</html>
