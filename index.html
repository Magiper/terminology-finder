<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law Terminology Finder</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>

/* ===== GLOBAL ===== */
body{
  font-family: "Segoe UI", sans-serif;
  margin:0;
  background: #2F2F35;
  overflow: hidden;
}

/* ===== LAYOUT ===== */
.app{
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width: 220px;
  background: #cfcfcf;
  padding: 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sidebar-logo{
  width: 70px;
  margin-bottom: 20px;
}

.nav-item{
  width: 90%;
  background: #ddd;
  margin: 8px 0;
  padding: 12px;
  border-radius: 25px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.nav-item:hover{
  background: #bbb;
}

/* ACTIVE MENU */
.nav-item.active{
  background: #4a90e2;
  color: white;
  font-weight: bold;
  transform: scale(1.05);
}

/* CONTACT */
.contact{
  margin-top: auto;
  font-size: 12px;
  text-align: center;
}

/* ===== MAIN PANEL ===== */
.main{
  flex: 1;
  padding: 20px;
  background: #4a4a52;
  border-radius: 20px;
  margin: 15px;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

/* ===== MAIN PANEL ===== */
.mini-hero{
  height: 140px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  background: url("background.jpg") center/cover no-repeat;
  margin-bottom: 15px;
}

/* DARK OVERLAY */
.hero-overlay{
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

/* CONTENT */
.hero-content{
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* LOGO */
.hero-logo{
  width: 70px;
}

/* TEXT */
.hero-text{
  color: white;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* ===== HEADER ===== */
.header{
  background: #7a7a82;
  padding: 15px;
  border-radius: 30px;
  color: #ffd166;
  font-weight: bold;
  overflow: hidden;
}

/* MOVING TEXT */
.marquee{
  white-space: nowrap;
}

.marquee span{
  display: inline-block;
  padding-left: 100%;
  animation: marqueeMove 15s linear infinite;
}

@keyframes marqueeMove{
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* ===== SEARCH ===== */
.search-box{
  margin: 20px auto;
  max-width: 420px;
  width: 100%;
  transition: 0.3s;
}

.search-box input{
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  outline: none;
}

/* ===== RESULT PANEL ===== */
.result-panel{
  flex: 1;
  background: #2F2F35;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
  margin-top: 10px;
  transition: 0.3s;
  padding: 25px;
  overflow-y: auto;
}

/* ===== FOOTER ===== */
.footer{
  text-align: center;
  font-size: 12px;
  color: #ccc;
  margin-top: 10px;
}

/* ===== ANIMATION (content fade) ===== */
.fade{
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{ opacity: 0; transform: translateY(10px); }
  to{ opacity: 1; transform: translateY(0); }
}
  
</style>
</head>

<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">

    <img src="logo.png" class="sidebar-logo">

    <div class="nav-item active" onclick="switchFeature(event, 'term')">🔍 Terminologi</div>
    <div class="nav-item" onclick="switchFeature(event, 'law')">📜 UU Internasional</div>
    <div class="nav-item" onclick="switchFeature(event, 'case')">📂 Riwayat Kasus</div>
    <div class="nav-item" onclick="switchFeature(event, 'reading')">📖 Daftar Bacaan</div>

    <div class="contact">
      Punya Kendala?<br>
      0877-7155-5574 (Hadi)
    </div>

  </div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <div class="mini-hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <img src="logo.png" class="hero-logo">

        <div class="hero-text">
          LAW TERMINOLOGY FINDER
        </div>
      </div>

    </div>

    <!-- HEADER -->
    <div class="header">
      <div class="marquee">
        <span>DIREKTORAT JENDERAL PEMASYARAKATAN SULAWESI TENGGARA</span>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box" id="searchBox">
      <input id="search" placeholder="Cari terminologi...">
    </div>

    <!-- RESULT -->
    <div class="result-panel fade" id="resultPanel">
      SEARCH RESULT
    </div>

    <!-- FOOTER -->
    <div class="footer">© LEX-KOMTRANS KANWILPAS</div>
  </div>

</div>

<script src="script.js"></script>

<script>

/* ===== FEATURE SWITCHER ===== */
let currentFeature = "term";

function switchFeature(event, feature){

  currentFeature = feature;

  // highlight menu
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
  });
  event.currentTarget.classList.add('active');


  // reset search UI
  const searchBox = document.getElementById("searchBox");
  const mainInput = document.getElementById("search");

  mainInput.value = "";

  // remove old events
  mainInput.oninput = null;
  mainInput.onkeydown = null;

  // ===== TERMINOLOGI =====
  if(feature === "term"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari terminologi...";

    // connect to original search
    mainInput.oninput = function(){
      document.getElementById("search").dispatchEvent(new Event("input"));
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        document.getElementById("search").dispatchEvent(new KeyboardEvent("keydown", {key:"Enter"}));
      }
    };
  }

  // ===== LAW =====
  else if(feature === "law"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari hukum internasional...";

    // redirect main input -> lawSearch
    mainInput.oninput = function(){
      const hiddenInput = document.getElementById("lawSearch");

      hiddenInput.value = mainInput.value;

      hiddenInput.dispatchEvent(new Event("input"));
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        document.getElementById("lawSearch").dispatchEvent(new KeyboardEvent('keydown', {key: 'Enter'}));
      }
    };
  }

  // ===== CASE =====
  else if(feature === "case"){
    searchBox.style.display = "block";
    mainInput.placeholder = "Cari kasus...";

    mainInput.oninput = function(){
      const hiddenInput = document.getElementById("caseSearch");

      hiddenInput.value = mainInput.value;

      hiddenInput.dispatchEvent(new Event("input"));
    };

    mainInput.onkeydown = function(e){
      if(e.key === "Enter"){
        document.getElementById("caseSearch").dispatchEvent(new KeyboardEvent('keydown', {key: 'Enter'}));
      }
    };
  }

  // ===== READING =====
  else if(feature === "reading"){
    searchBox.style.display = "none";
    renderReading();
  }
}

</script>

</body>
</html>
